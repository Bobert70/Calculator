<!DOCTYPE html>
<html lang="en">
<head>
  <title></title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>CALCULATOR</h1>
  <p id="display"></p>
  <div id="buttons">
  <button class="button" onclick="one()" id="1">1</button>
  <button class="button" onclick="two()" id="2">2</button>
  <button class="button" onclick="three()" id="3">3</button>
  <br />
  <button class="button" onclick="four()" id="4">4</button>
  <button class="button" onclick="five()" id="5">5</button>
  <button class="button" onclick="six()" id="6">6</button>
  <br />
  <button class="button" onclick="seven()" id="7">7</button>
  <button class="button" onclick="eight()" id="8">8</button>
  <button class="button" onclick="nine()" id="9">9</button>
  <br />
  <button class="button" onclick="zero()" id="0">0</button>
  <button class="button" onclick="add()" id="+">+</button>
  <button class="button" onclick="subtract()" id="-">-</button>
  <br />
  <button class="button" onclick="divide()" id="/">/</button>
  <button class="button" onclick="multiply()" id="*">*</button>
  <button class="button" onclick="solve()" id="=">=</button>
  <br />
  <button id="Rparentheses" class="button" onclick="Rparentheses()">(</button>
  <button id="Lparentheses" class="button" onclick="Lparentheses()">)</button>
  <button class="button" id="c" onclick="reset()">C</button>
  </div>
  <script src="main.js"></script>
</body>
</html>
